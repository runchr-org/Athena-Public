name: Link & Path Integrity Check

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - "**/*.py"
      - "**/*.sh"
      - "**/*.yml"
  pull_request:
    branches: [main]
    paths:
      - "**/*.md"
      - "**/*.py"
      - "**/*.sh"
      - "**/*.yml"

permissions:
  contents: read

jobs:
  check-links:
    name: Validate Markdown Links & Paths
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for private path leaks
        run: |
          echo "🔍 Scanning for private path leaks..."
          # Match /Users/<real-username>/ but EXCLUDE known safe patterns:
          #   /Users/[AUTHOR]/     — redacted placeholder
          #   /Users/<REDACTED>/   — redacted placeholder
          #   /Users/<username>/   — generic doc example
          #   /Users/you/          — generic doc example
          #   /Users/[^/\s]+       — regex pattern in code (e.g. diagnostic_relay.py)
          LEAKS=$(grep -rn '/Users/' \
            --include='*.md' --include='*.py' --include='*.yml' --include='*.sh' \
            . 2>/dev/null \
            | grep -v '\.git/' \
            | grep -v '/Users/\[AUTHOR\]/' \
            | grep -v '/Users/<REDACTED>/' \
            | grep -v '/Users/<username>/' \
            | grep -v '/Users/you/' \
            | grep -v '/Users/example/' \
            | grep -v '/Users/\[^' \
            | grep -v 'link-checker.yml' \
            | grep -v '\.startswith("/Users/")' \
            || true)
          if [ -n "$LEAKS" ]; then
            echo "❌ PRIVATE PATHS DETECTED:"
            echo "$LEAKS"
            echo ""
            echo "Fix: Replace real usernames with [AUTHOR] or <REDACTED>"
            exit 1
          fi
          echo "✅ No private path leaks found."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Check for dead internal links
        run: python3 .github/scripts/check_links.py
