# =============================================================================
# public_manifest.yaml — Explicit Allowlist for Athena-Public Deployment
# =============================================================================
# ONLY files listed here will be synced to the public repo.
# Everything not listed is BLOCKED by default. This inverts the previous
# blocklist model (.syncignore) which failed silently on TD-027.
