# =============================================================================
# BLOCKED BY DEFAULT (never listed = never synced)
# =============================================================================
# Everything not listed above is implicitly blocked. Typical examples:
#   - .env (live secrets)
#   - Personal data directories
#   - .agent/state/ (behavioral state, trigger logs)
#   - Raw session logs and private case studies
#   - Clinical or psychological profile modules
#   - Any file that hasn't passed pre_deploy_scan.sh
# =============================================================================
